apiVersion: apps/v1
kind: Deployment

metadata:
  name: orbitalnet-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: orbitalnet-backend

  template:
    metadata:
      labels:
        app: orbitalnet-backend

    spec:
      containers:
      - name: backend
        image: orbitalnet-backend:latest

        ports:
        - containerPort: 5000