apiVersion: apps/v1
kind: Deployment

metadata:
  name: orbitalnet-frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: orbitalnet-frontend

  template:
    metadata:
      labels:
        app: orbitalnet-frontend

    spec:
      containers:
      - name: frontend
        image: orbitalnet-frontend:latest

        ports:
        - containerPort: 5173